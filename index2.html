// ═══════ 照片系统 ═══════
let PHOTOS=[];
function handleFiles(e){[...e.target.files].forEach(f=>{const r=new FileReader();r.onload=ev=>{PHOTOS.push(ev.target.result);updPh()};r.readAsDataURL(f)});e.target.value=''}
function addUrl(){const inp=document.getElementById('urlIn'),u=inp.value.trim();if(!u)return;PHOTOS.push(u);updPh();inp.value='';toast('✅')}

  // 天气/时间背景

  G.hist.push({role:'user',content:`${t}${ctx}${extra}`});
  if(Math.random()>.85&&G.mode!=='visit')G.busyMode=true;
  setTimeout(gen,500+Math.random()*800);
}

async function renderBubbles(lines){
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(i>0&&(l.t==='him'||l.t==='npc'))await sleep(250+Math.random()*500);
    if(l.t==='desc'){
      if(l.mode==='rival')addBub('sys','<span style="color:#e91e63">'+l.v+'</span>');
      else if(l.mode==='crisis')addBub('sys','<span style="color:#d32f2f">⚠️ '+l.v+'</span>');
      else addBub('sys',l.v);
    }
    else if(l.t==='sys')addBub('sys',l.v);
    else if(l.t==='him')addBub('him',l.v);
    else if(l.t==='voice')addVoice(l.v);
    else if(l.t==='withdrawn')addWithdrawn();
    else if(l.t==='read')addBub('sys','<span style="color:#ccc;font-size:10px">[已读]</span>');
    else if(l.t==='timeskip')addBub('sys',`<span style="color:#b0a0c0;font-size:10px">${l.v}</span>`);
    else if(l.t==='rival')addBub('rival',l.v,l.sp);
    else if(l.t==='npc')addBub(l.sp,l.v);
    scB();
  }
}
function parseLines(txt){
  const lines=[];let mode='normal';
  txt.split('\n').forEach(l=>{l=l.trim();if(!l)return;
    if(l.match(/^---rival---$/i)){mode='rival';return}
    if(l.match(/^---crisis---$/i)){mode='crisis';return}
    if(l.match(/^---end---$/i)){mode='normal';return}
    const scM=l.match(/^---scene:(.+)---$/i);
    if(scM){G.scene=scM[1];document.getElementById('sceneStrip').textContent=`📍 ${scM[1]}`;lines.push({t:'sys',v:`📍 ${scM[1]}`,mode});return}
    if(l.match(/撤回了一条消息/)){lines.push({t:'withdrawn'});return}
    if(l.match(/^\[已读\]$|^\[已读不回/)){lines.push({t:'read'});return}
    const timeM=l.match(/^\[(.+(?:后|——).*)\]$/);
    if(timeM&&l.match(/分钟|小时|后|——/)){lines.push({t:'timeskip',v:timeM[1]});return}
    const voiceM=l.match(/\[语音\s*(\d+)[""'"]?\]/);
    if(voiceM){lines.push({t:'voice',v:voiceM[1]});return}
    const dlgM=l.match(/^([^：:""（）\[\]]{1,12})[：:]\s*(.+)/);
    if(dlgM){const sp=dlgM[1].trim(),tx=dlgM[2].trim().replace(/^["""]+|["""]+$/g,'');
      if(sp==='_4444x_'||sp==='4444x')lines.push({t:'him',v:tx,mode});
      else if(sp.match(/^(摄影师|导演|作家|主唱|竹马|廖凡)$/))lines.push({t:'rival',sp,v:tx,mode});
      else if(sp==='胖虎')lines.push({t:'npc',sp:'🐯 胖虎',v:tx,mode});
      else lines.push({t:'npc',sp,v:tx,mode});return}
    if(l.match(/^[（(].+[）)]$/)){lines.push({t:'desc',v:`<span style="color:#b0a090;font-size:12px">${l}</span>`,mode});return}
    if(l.match(/^\[.+\]$/)){
      if(l.match(/图片/))lines.push({t:'him',v:l,mode});
      else lines.push({t:'sys',v:`<span style="color:#b0a0c0;font-size:11px">${l}</span>`,mode});return}
    lines.push({t:'him',v:l,mode});
  });return lines;
}

const SV_KEY='ug_tl_v1';
function gSv(){try{return JSON.parse(localStorage.getItem(SV_KEY)||'{}')}catch{return{}}}
function sSv(s){localStorage.setItem(SV_KEY,JSON.stringify(s))}
function renderSl(){const svs=gSv(),c=document.getElementById('svSlots');c.innerHTML='';const ks=Object.keys(svs).sort((a,b)=>svs[b].t-svs[a].t);if(!ks.length){c.innerHTML='<p style="text-align:center;color:#ccc;padding:20px;font-size:12px">暂无存档</p>';return}ks.forEach(k=>{const s=svs[k];const d=document.createElement('div');d.className='sv-slot';d.innerHTML=`<div class="si"><div class="sn">${s.n||k}</div><div class="sm">${new Date(s.t).toLocaleString('zh-CN')} · ${s.d.curDate} · 💕${s.d.love}</div></div><div class="sa"><button class="sb" onclick="lSv('${k}')">读</button><button class="sb dl" onclick="dSv('${k}')">删</button></div>`;c.appendChild(d)})}
function crtSv(){const n=prompt('存档名：',G.curDate);if(!n)return;const s=gSv();s['sv_'+Date.now()]={n,t:Date.now(),d:JSON.parse(JSON.stringify(G))};sSv(s);renderSl();toast('✅ 已保存')}
function dSv(id){if(!confirm('删除？'))return;const s=gSv();delete s[id];sSv(s);renderSl()}
function lSv(id){const s=gSv()[id];if(!s)return;G=JSON.parse(JSON.stringify(s.d));document.getElementById('splash').style.display='none';document.getElementById('inDock').style.display='block';const c=document.getElementById('msgList');c.innerHTML='';G.msgs.forEach(m=>addBub(m.who,m.text));updS();updDay();updTimeline();document.getElementById('sceneStrip').textContent=`📍 ${G.scene}`;closePnl('save');scB();toast('✅ 已读取')}
function qSv(){const s=gSv();s['qs']={n:'⚡快存',t:Date.now(),d:JSON.parse(JSON.stringify(G))};sSv(s);toast('⚡ 已快存')}
function qLd(){const s=gSv();if(!s.qs){toast('没有快存');return}lSv('qs')}
function autoSv(){const s=gSv();s['auto']={n:'🔄自动',t:Date.now(),d:JSON.parse(JSON.stringify(G))};sSv(s)}
function expSv(){const b=new Blob([JSON.stringify(gSv(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`地下情存档_${Date.now()}.json`;a.click()}
function hImp(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const data=JSON.parse(ev.target.result);const cur=gSv();Object.assign(cur,data);sSv(cur);renderSl();toast('✅ 已导入')}catch{alert('文件格式错误')}};r.readAsText(f);e.target.value=''}
function toast(m){const d=document.createElement('div');d.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.72);color:#fff;padding:9px 20px;border-radius:10px;font-size:12px;z-index:999;pointer-events:none';d.textContent=m;document.body.appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transition='.4s';setTimeout(()=>d.remove(),400)},1400)}

// ═══════ 花瓣 ═══════
(function(){const c=document.getElementById('pts');for(let i=0;i<6;i++){const p=document.createElement('div');p.className='pt';const s=Math.random()*5+4;p.style.cssText=`left:${Math.random()*100}%;width:${s}px;height:${s}px;animation-duration:${Math.random()*12+10}s;animation-delay:${Math.random()*15}s`;c.appendChild(p)}})();
</script>
</body>
